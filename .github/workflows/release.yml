name: Release

# Publishes every workspace distribution to PyPI when a version tag is pushed.
# Versions are managed in lockstep (see scripts/set_version.py); the tag must
# match the version already set in the packages, e.g. tag v0.0.1 for version 0.0.1.
# Auth: PyPI API token in the `PYPI_API_TOKEN` secret (environment `pypi`).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:        # allow manual re-runs (e.g. to retry rate-limited uploads)

jobs:
  test:
    name: test gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy
      - run: uv run pytest -q

  publish:
    name: build & publish
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      # Publish one distribution at a time. Sequential uploads avoid PyPI's
      # "too many new projects" burst limit on a first release, and --check-url
      # skips any distribution whose version is already on the index, so the job
      # is safe to re-run.
      - name: Build and publish all distributions
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          packages=(
            fast-feature-core
            fast-feature-engine
            fast-feature-storage-sqlalchemy
            fast-feature-storage-inmemory
            fast-feature-storage-postgresql
            fast-feature-ofrep
            fast-feature-admin
            fast-feature-testing
            fast-feature
          )
          failed=()
          for pkg in "${packages[@]}"; do
            echo "::group::publish $pkg"
            rm -rf dist
            uv build --package "$pkg"
            published=0
            # Retry up to 3 times, 60s apart, to ride out PyPI's new-project rate
            # limit. --check-url makes an already-published version a no-op.
            for attempt in 1 2 3; do
              if uv publish --check-url https://pypi.org/simple/ dist/*; then
                published=1
                break
              fi
              if [ "$attempt" -lt 3 ]; then
                echo "publish $pkg attempt $attempt failed; retrying in 60s"
                sleep 60
              fi
            done
            if [ "$published" -ne 1 ]; then
              failed+=("$pkg")
            fi
            echo "::endgroup::"
          done
          if [ ${#failed[@]} -ne 0 ]; then
            echo "::error::Failed to publish: ${failed[*]}"
            exit 1
          fi
