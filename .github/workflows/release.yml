name: Release

# Publishes every workspace distribution to PyPI when a version tag is pushed.
# Versions are managed in lockstep (see scripts/set_version.py); the tag must
# match the version already set in the packages, e.g. tag v0.0.1 for version 0.0.1.
# Auth: PyPI API token in the `PYPI_API_TOKEN` secret (environment `pypi`).
on:
  push:
    tags: ["v*"]

jobs:
  test:
    name: test gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy
      - run: uv run pytest -q

  publish:
    name: publish ${{ matrix.package }}
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    strategy:
      fail-fast: false
      matrix:
        package:
          - fast-feature-core
          - fast-feature-engine
          - fast-feature-ofrep
          - fast-feature-testing
          - fast-feature-storage-inmemory
          - fast-feature-storage-sqlalchemy
          - fast-feature-storage-postgresql
          - fast-feature-admin
          - fast-feature
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Build ${{ matrix.package }}
        run: uv build --package ${{ matrix.package }}
      - name: Publish ${{ matrix.package }} to PyPI
        run: uv publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
