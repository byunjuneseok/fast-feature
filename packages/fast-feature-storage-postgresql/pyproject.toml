[project]
name = "fast-feature-storage-postgresql"
version = "0.0.2"
description = "PostgreSQL storage backend for fast-feature (asyncpg)."
license = "Apache-2.0"
requires-python = ">=3.10"
authors = [
    { name = "byunjuneseok", email = "byunjuneseok@gmail.com" },
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: AsyncIO",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = [
    "fast-feature-storage-sqlalchemy==0.0.2",
    "asyncpg>=0.29",
]

[build-system]
requires = ["uv_build>=0.11.17,<0.12.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "fast_feature.storage.postgresql"

[tool.uv.sources]
fast-feature-storage-sqlalchemy = { workspace = true }
