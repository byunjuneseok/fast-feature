# Virtual workspace root for the fast-feature monorepo.
# Each distribution lives under packages/*; this root is not itself published.

[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
fast-feature-core = { workspace = true }
fast-feature-engine = { workspace = true }
fast-feature-ofrep = { workspace = true }
fast-feature-testing = { workspace = true }
fast-feature-storage-inmemory = { workspace = true }
fast-feature-storage-sqlalchemy = { workspace = true }
fast-feature-storage-postgresql = { workspace = true }

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
    "aiosqlite>=0.20",
    "ruff>=0.5",
    "mypy>=1.10",
    "pytest-cov>=5.0",
    # Integration testing against the real OpenFeature SDK + OFREP provider.
    "openfeature-provider-ofrep>=0.3",
    "uvicorn>=0.27",
    # Workspace members, installed editable for local dev and tooling.
    "fast-feature-core",
    "fast-feature-engine",
    "fast-feature-ofrep",
    "fast-feature-testing",
    "fast-feature-storage-inmemory",
    "fast-feature-storage-sqlalchemy",
    "fast-feature-storage-postgresql",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
addopts = "--cov --cov-report=term-missing"
testpaths = [
    "packages/fast-feature-core/tests",
    "packages/fast-feature-engine/tests",
    "packages/fast-feature-ofrep/tests",
    "packages/fast-feature-storage-inmemory/tests",
    "packages/fast-feature-storage-sqlalchemy/tests",
    "packages/fast-feature-storage-postgresql/tests",
]

[tool.coverage.run]
source_pkgs = ["fast_feature"]
branch = true
omit = ["*/fast_feature/testing/*"]

[tool.coverage.report]
fail_under = 95
show_missing = true
exclude_also = [
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "@(abc\\.)?abstractmethod",
    "\\.\\.\\.",
]

[tool.ruff]
line-length = 100
target-version = "py310"
src = [
    "packages/fast-feature-core/src",
    "packages/fast-feature-engine/src",
    "packages/fast-feature-ofrep/src",
    "packages/fast-feature-testing/src",
    "packages/fast-feature-storage-inmemory/src",
    "packages/fast-feature-storage-sqlalchemy/src",
    "packages/fast-feature-storage-postgresql/src",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "ASYNC"]

[tool.ruff.lint.isort]
known-first-party = ["fast_feature"]

[tool.mypy]
python_version = "3.10"
strict = true
namespace_packages = true
explicit_package_bases = true
mypy_path = [
    "packages/fast-feature-core/src",
    "packages/fast-feature-engine/src",
    "packages/fast-feature-ofrep/src",
    "packages/fast-feature-testing/src",
    "packages/fast-feature-storage-inmemory/src",
    "packages/fast-feature-storage-sqlalchemy/src",
    "packages/fast-feature-storage-postgresql/src",
]
files = [
    "packages/fast-feature-core/src",
    "packages/fast-feature-engine/src",
    "packages/fast-feature-ofrep/src",
    "packages/fast-feature-testing/src",
    "packages/fast-feature-storage-inmemory/src",
    "packages/fast-feature-storage-sqlalchemy/src",
    "packages/fast-feature-storage-postgresql/src",
    "packages/fast-feature-core/tests",
    "packages/fast-feature-engine/tests",
    "packages/fast-feature-ofrep/tests",
    "packages/fast-feature-storage-inmemory/tests",
    "packages/fast-feature-storage-sqlalchemy/tests",
    "packages/fast-feature-storage-postgresql/tests",
]

[[tool.mypy.overrides]]
module = ["mmh3"]
ignore_missing_imports = true
